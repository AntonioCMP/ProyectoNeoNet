<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="NeoNet Terminal — Análisis técnico en tiempo real con cruces de medias móviles.">
    <title>NeoNet | Terminal de Trading</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23121212'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='%2341DD97' font-family='Arial' font-weight='bold'>N</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        :root {
            /* Paleta oficial NeoNet */
            --nn-dark-brown: #541502;
            --nn-teal: #0685A1;
            --nn-cyan: #05A3AE;
            --nn-light-green: #41DD97;
            --nn-ochre: #9A5F0B;
            --nn-bg-gray: #E8EAE7;
            --nn-emerald: #12956B;

            --t-bg: #101211;
            --t-panel: #181b1a;
            --t-line: #262b29;
            --t-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--t-bg);
            background-image:
                radial-gradient(ellipse 55% 35% at 80% -5%, rgba(6, 133, 161, 0.10), transparent 60%),
                radial-gradient(ellipse 45% 30% at 10% 105%, rgba(18, 149, 107, 0.08), transparent 60%);
            background-attachment: fixed;
            color: #e0e0e0;
        }

        .mono { font-family: var(--t-mono); }

        /* ── Header ────────────────────────────────────────────────────── */
        .terminal-header {
            border-bottom: 1px solid var(--t-line);
            background-color: rgba(24, 27, 26, 0.9);
            backdrop-filter: blur(6px);
        }
        .mode-chip {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--nn-light-green);
            background: rgba(65, 221, 151, 0.08);
            border: 1px solid rgba(65, 221, 151, 0.25);
            border-radius: 999px; padding: 0.28rem 0.8rem; white-space: nowrap;
        }
        .mode-chip .dot {
            display: inline-block; width: 7px; height: 7px; border-radius: 50%;
            background: var(--nn-light-green); margin-right: 0.4rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 50% { opacity: 0.35; } }

        .btn-back { background-color: #232725; color: #fff; border: 1px solid var(--t-line); transition: 0.2s; }
        .btn-back:hover { background-color: #2f3532; color: #fff; }

        /* ── Búsqueda ──────────────────────────────────────────────────── */
        .search-box {
            background: var(--t-panel); border: 1px solid var(--t-line); color: #fff;
            border-radius: 8px; font-family: var(--t-mono); letter-spacing: 0.05em;
        }
        .search-box::placeholder { color: #5b625f; font-family: 'Inter', sans-serif; letter-spacing: 0; }
        .search-box:focus {
            background: var(--t-panel); color: #fff; border-color: var(--nn-teal);
            box-shadow: 0 0 0 4px rgba(6, 133, 161, 0.18);
        }
        .btn-analyze {
            background: linear-gradient(135deg, var(--nn-teal), var(--nn-cyan));
            color: #fff; border: none; font-weight: 700;
        }
        .btn-analyze:hover { filter: brightness(1.1); color: #fff; }
        .btn-analyze:focus-visible { outline: 3px solid rgba(5,163,174,.5); outline-offset: 2px; }

        /* ── Paneles ───────────────────────────────────────────────────── */
        .dashboard-panel {
            background-color: var(--t-panel);
            border-radius: 14px;
            border: 1px solid var(--t-line);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.55);
        }
        .panel-accent { border-top: 3px solid var(--nn-teal); }

        .metric-label {
            font-size: 0.72rem; color: #7c847f; text-transform: uppercase;
            letter-spacing: 0.14em; font-weight: 700;
        }
        .metric-value {
            font-family: var(--t-mono);
            font-size: 1.55rem; font-weight: 700; color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .text-buy { color: var(--nn-light-green) !important; }
        .text-sell { color: var(--nn-ochre) !important; }
        .text-neutral { color: var(--nn-cyan) !important; }

        .signal-box {
            background:
                radial-gradient(circle at 50% -30%, rgba(6, 133, 161, 0.12), transparent 70%),
                rgba(255, 255, 255, 0.025);
            border: 1px solid var(--t-line);
        }
        #resDecision { font-family: var(--t-mono); letter-spacing: 0.04em; }

        /* ── Loader estilo "boot de terminal" ──────────────────────────── */
        .terminal-loader {
            display: inline-block; text-align: left;
            background: var(--t-panel); border: 1px solid var(--t-line);
            border-radius: 12px; padding: 1.5rem 2rem;
            font-family: var(--t-mono); font-size: 0.85rem; color: #9aa39e;
            min-width: 300px;
        }
        .terminal-loader .tl-line { opacity: 0; animation: tlIn 0.4s ease forwards; }
        .terminal-loader .tl-line:nth-child(2) { animation-delay: 0.5s; }
        .terminal-loader .tl-line:nth-child(3) { animation-delay: 1.1s; }
        .terminal-loader .tl-line:nth-child(4) { animation-delay: 1.7s; }
        .terminal-loader .ok { color: var(--nn-light-green); }
        .terminal-loader .cursor {
            display: inline-block; width: 8px; height: 14px; vertical-align: middle;
            background: var(--nn-light-green); animation: blink 0.9s step-end infinite;
        }
        @keyframes tlIn { to { opacity: 1; } }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── Historial / auditoría ─────────────────────────────────────── */
        .history-list { max-height: 460px; overflow-y: auto; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #3a423e; border-radius: 4px; }

        .history-item {
            border: 1px solid var(--t-line);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.015);
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }
        .history-item:hover { border-color: #3a423e; background: rgba(255,255,255,0.035); transform: translateX(2px); }
        .history-item .trade-price { font-family: var(--t-mono); font-variant-numeric: tabular-nums; }
        .history-item .trade-meta { font-family: var(--t-mono); font-size: 0.75rem; font-variant-numeric: tabular-nums; }

        .empty-state {
            border: 1px dashed var(--t-line); border-radius: 12px;
            color: #7c847f; padding: 2.5rem 1rem;
        }
        .empty-state .bi { color: var(--nn-teal); }

        .chart-wrap { position: relative; height: 190px; }

        .fade-in { animation: fadeIn 0.45s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
            .terminal-loader .tl-line { opacity: 1; }
        }
        @media (max-width: 576px) {
            .metric-value { font-size: 1.25rem; }
            #resDecision { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="terminal-header py-2 mb-4 shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center gap-2">
            <button onclick="history.back()" class="btn btn-back rounded-pill px-3 py-1 btn-sm fw-semibold">
                <i class="bi bi-arrow-left me-1"></i> Portafolio
            </button>

            <img src="{{ logo_url }}" alt="NeoNet Logo" style="height: 42px; object-fit: contain;">

            <span class="mode-chip"><span class="dot" aria-hidden="true"></span>Terminal</span>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <label for="tickerInput" class="metric-label d-block mb-2 text-center">Analiza un instrumento por cruce de medias móviles</label>
                <div class="input-group input-group-lg shadow-sm">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-search" aria-hidden="true"></i></span>
                    <input type="text" id="tickerInput" class="form-control search-box" value="{{ ticker_inicial }}" placeholder="Ej. AAPL, TSLA, SPY" aria-label="Ticker a analizar" autocomplete="off">
                    <button class="btn btn-analyze px-4" onclick="analizarTicker()">Analizar M.M.</button>
                </div>
            </div>
        </div>

        <div id="loading" style="display:none;" class="text-center py-5" role="status" aria-live="polite">
            <div class="terminal-loader">
                <div class="tl-line"><span class="ok">&gt;</span> Conectando con el mercado<span class="ok"> ··· OK</span></div>
                <div class="tl-line"><span class="ok">&gt;</span> Descargando serie de precios<span class="ok"> ··· OK</span></div>
                <div class="tl-line"><span class="ok">&gt;</span> Calculando MM 5d / 20d</div>
                <div class="tl-line"><span class="ok">&gt;</span> <span class="cursor" aria-hidden="true"></span></div>
            </div>
        </div>

        <div class="row g-4" id="botDashboard" style="display:none;">

            <div class="col-lg-5">
                <div class="dashboard-panel panel-accent p-4 h-100 fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3" style="border-color: var(--t-line) !important;">
                        <h4 class="fw-bold mb-0 text-white mono" id="resTicker">TICKER</h4>
                        <span class="badge" style="background-color: var(--nn-dark-brown); letter-spacing: 0.06em;">Tiempo Real</span>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <div class="metric-label mb-1">Precio Actual</div>
                            <div class="metric-value">$<span id="resPrecio">0.00</span></div>
                        </div>
                        <div class="col-6">
                            <div class="metric-label mb-1">Volatilidad Anual</div>
                            <div class="metric-value"><span id="resVol">0</span>%</div>
                        </div>
                        <div class="col-6">
                            <div class="metric-label mb-1"><i class="bi bi-arrow-up-right me-1" style="color: var(--nn-cyan);"></i>Media Corta (5d)</div>
                            <div class="metric-value fs-4" style="color: var(--nn-cyan);">$<span id="resMcorta">0.00</span></div>
                        </div>
                        <div class="col-6">
                            <div class="metric-label mb-1"><i class="bi bi-arrow-right me-1" style="color: var(--nn-emerald);"></i>Media Larga (20d)</div>
                            <div class="metric-value fs-4" style="color: var(--nn-emerald);">$<span id="resMlarga">0.00</span></div>
                        </div>
                    </div>

                    <div class="p-4 rounded-3 text-center signal-box mb-4" aria-live="polite">
                        <div class="metric-label mb-2">Señal del Algoritmo</div>
                        <h1 id="resDecision" class="display-5 fw-bold mb-0">ESPERANDO</h1>
                        <div id="signalHint" class="small mt-2" style="color:#7c847f;"></div>
                    </div>

                    <div>
                        <div class="metric-label mb-2"><i class="bi bi-bar-chart-line me-1" style="color: var(--nn-teal);"></i>MM corta vs MM larga</div>
                        <div class="chart-wrap">
                            <canvas id="mmChart" aria-label="Comparación de media corta y media larga" role="img"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="dashboard-panel p-4 h-100 fade-in">
                    <h5 class="fw-bold mb-3 border-bottom pb-3" style="color: var(--nn-bg-gray); border-color: var(--t-line) !important;">
                        <i class="bi bi-clock-history me-2" style="color: var(--nn-teal);"></i>Auditoría de Cruces
                    </h5>

                    <div class="history-list pe-2" id="listaHistorial"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if(document.getElementById('tickerInput').value) {
                analizarTicker();
            }
            document.getElementById('tickerInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') analizarTicker();
            });
        });

        let mmChartInstance = null;

        // Visualización adicional: no reemplaza ningún dato, solo grafica lo ya recibido.
        function renderMMChart(analisis, auditoria) {
            try {
                if (typeof Chart === 'undefined') return;
                const ctx = document.getElementById('mmChart');
                if (!ctx) return;
                if (mmChartInstance) { mmChartInstance.destroy(); mmChartInstance = null; }

                const cyan = '#05A3AE', emerald = '#12956B';
                const gridColor = 'rgba(255,255,255,0.06)', tickColor = '#7c847f';

                if (auditoria && auditoria.length > 1) {
                    // Línea temporal de los cruces registrados + punto actual
                    const labels = auditoria.map(op => op.fecha).concat(['Hoy']);
                    const cortas = auditoria.map(op => parseFloat(op.media_corta)).concat([parseFloat(analisis.media_corta)]);
                    const largas = auditoria.map(op => parseFloat(op.media_larga)).concat([parseFloat(analisis.media_larga)]);

                    mmChartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                { label: 'MM Corta (5d)', data: cortas, borderColor: cyan, backgroundColor: 'rgba(5,163,174,0.12)', tension: 0.35, pointRadius: 3, borderWidth: 2 },
                                { label: 'MM Larga (20d)', data: largas, borderColor: emerald, backgroundColor: 'rgba(18,149,107,0.12)', tension: 0.35, pointRadius: 3, borderWidth: 2 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { labels: { color: tickColor, boxWidth: 10, font: { family: "'JetBrains Mono', monospace", size: 10 } } } },
                            scales: {
                                x: { ticks: { color: tickColor, maxTicksLimit: 5, font: { size: 9 } }, grid: { color: gridColor } },
                                y: { ticks: { color: tickColor, font: { family: "'JetBrains Mono', monospace", size: 9 } }, grid: { color: gridColor } }
                            }
                        }
                    });
                } else {
                    // Sin historial suficiente: comparación directa de las dos medias actuales
                    mmChartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['MM Corta (5d)', 'MM Larga (20d)'],
                            datasets: [{
                                data: [parseFloat(analisis.media_corta), parseFloat(analisis.media_larga)],
                                backgroundColor: ['rgba(5,163,174,0.55)', 'rgba(18,149,107,0.55)'],
                                borderColor: [cyan, emerald], borderWidth: 2, borderRadius: 6
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { ticks: { color: tickColor, font: { size: 10 } }, grid: { display: false } },
                                y: { beginAtZero: false, ticks: { color: tickColor, font: { family: "'JetBrains Mono', monospace", size: 9 } }, grid: { color: gridColor } }
                            }
                        }
                    });
                }
            } catch (e) {
                // La gráfica es opcional: nunca debe romper el flujo principal.
                console.warn('Chart no disponible:', e);
            }
        }

        async function analizarTicker() {
            const ticker = document.getElementById('tickerInput').value.toUpperCase();
            if(!ticker) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('botDashboard').style.display = 'none';
            document.getElementById('listaHistorial').innerHTML = '';

            try {
                const response = await fetch(`/api/bot/analizar/${ticker}`);
                const data = await response.json();

                if(data.analisis.error) {
                    alert(data.analisis.error);
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                document.getElementById('resTicker').innerText = data.analisis.ticker;
                document.getElementById('resPrecio').innerText = data.analisis.precio_actual;
                document.getElementById('resVol').innerText = data.analisis.volatilidad_porcentaje;
                document.getElementById('resMcorta').innerText = data.analisis.media_corta;
                document.getElementById('resMlarga').innerText = data.analisis.media_larga;

                const dec = data.analisis.decision_actual;
                const decisionElement = document.getElementById('resDecision');
                decisionElement.innerText = dec;

                decisionElement.className = 'display-5 fw-bold mb-0 ';
                const hintEl = document.getElementById('signalHint');
                if(dec === 'COMPRAR') {
                    decisionElement.className += 'text-buy';
                    if (hintEl) hintEl.innerHTML = '<i class="bi bi-graph-up-arrow me-1 text-buy"></i>MM corta por encima de la MM larga';
                } else if(dec === 'VENDER') {
                    decisionElement.className += 'text-sell';
                    if (hintEl) hintEl.innerHTML = '<i class="bi bi-graph-down-arrow me-1 text-sell"></i>MM corta por debajo de la MM larga';
                } else {
                    decisionElement.className += 'text-neutral';
                    if (hintEl) hintEl.innerHTML = '<i class="bi bi-dash-lg me-1 text-neutral"></i>Sin señal dominante';
                }

                const historial = data.auditoria;
                const lista = document.getElementById('listaHistorial');

                // Gráfica adicional (orden cronológico, antes del reverse visual)
                renderMMChart(data.analisis, Array.isArray(historial) ? [...historial] : []);

                if(historial.length === 0) {
                    lista.innerHTML = `
                        <div class="empty-state text-center mt-4">
                            <i class="bi bi-activity fs-1 d-block mb-2"></i>
                            <div class="fw-semibold text-light mb-1">Sin cruces de medias recientes</div>
                            <div class="small">Cuando la MM de 5 días cruce a la de 20 días, el evento aparecerá aquí.</div>
                        </div>`;
                } else {
                    historial.reverse().forEach(op => {
                        const isBuy = op.tipo === 'COMPRA';
                        const colorClass = isBuy ? 'text-buy' : 'text-sell';
                        const iconClass = isBuy ? 'bi-graph-up-arrow' : 'bi-graph-down-arrow';
                        const bgColor = isBuy ? 'rgba(65, 221, 151, 0.1)' : 'rgba(154, 95, 11, 0.15)';

                        const div = document.createElement('div');
                        div.className = "history-item d-flex justify-content-between align-items-center flex-wrap gap-2";
                        div.innerHTML = `
                            <div class="d-flex align-items-center">
                                <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0" style="width: 42px; height: 42px; background-color: ${bgColor};">
                                    <i class="bi ${iconClass} fs-5 ${colorClass}" aria-hidden="true"></i>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold ${colorClass} trade-price">${op.tipo} · $${op.precio}</h6>
                                    <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>${op.fecha}</small>
                                </div>
                            </div>
                            <div class="text-end trade-meta text-muted">
                                <div>MM5 <span style="color: var(--nn-cyan); font-weight: 600;">$${op.media_corta}</span></div>
                                <div>MM20 <span style="color: var(--nn-emerald); font-weight: 600;">$${op.media_larga}</span></div>
                            </div>
                        `;
                        lista.appendChild(div);
                    });
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('botDashboard').style.display = 'flex';
            } catch (error) {
                alert("Error de conexión.");
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
